# fly.toml app configuration file generated for kioskflow-backend on 2026-05-04T19:34:04+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kioskflow-backend'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOWED_ORIGINS = '*'
  SERVER_ADDR = '0.0.0.0:8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  connect_timeout_ms = 5000
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
