syntax = "proto3";

package branch;

import "common.proto";

service BranchService {
    rpc ListBranches (ListBranchesRequest) returns (ListBranchesResponse);
    rpc CreateBranch (CreateBranchRequest) returns (Branch);
    rpc UpdateBranch (UpdateBranchRequest) returns (Branch);
    rpc DeleteBranch (DeleteBranchRequest) returns (common.SuccessResponse);
    rpc GetBranch (GetBranchRequest) returns (Branch);
}

message Branch {
    string id = 1;
    string tenant_id = 2;
    string name = 3;
    optional string address = 4;
    optional string phone = 5;
    bool is_main = 6;
    bool is_active = 7;
    string created_at = 8;
}

message ListBranchesRequest {
    common.PaginationRequest pagination = 1;
}

message ListBranchesResponse {
    repeated Branch branches = 1;
    common.PaginationResponse pagination = 2;
}

message CreateBranchRequest {
    string name = 1;
    optional string address = 2;
    optional string phone = 3;
    bool is_main = 4;
    bool is_active = 5;
}

message UpdateBranchRequest {
    string id = 1;
    optional string name = 2;
    optional string address = 3;
    optional string phone = 4;
    optional bool is_main = 5;
    optional bool is_active = 6;
}

message DeleteBranchRequest {
    string id = 1;
}

message GetBranchRequest {
    string id = 1;
}

