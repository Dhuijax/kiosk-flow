syntax = "proto3";

package common;

message Money {
    string currency_code = 1;
    int64 units = 2;
    int32 nanos = 3;
}

message PaginationRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message PaginationResponse {
    int32 total_count = 1;
    int32 total_pages = 2;
    bool has_next = 3;
}

message Timestamp {
    int64 seconds = 1;
    int32 nanos = 2;
}

message SuccessResponse {
    bool success = 1;
    string message = 2;
}
