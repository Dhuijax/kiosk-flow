syntax = "proto3";

package store;

service StoreService {
    rpc GetStoreInfo (GetStoreRequest) returns (Store);
    rpc UpdateStore (UpdateStoreRequest) returns (Store);
}

message GetStoreRequest {
    string id = 1; // can be empty for current tenant store
}

message UpdateStoreRequest {
    string name = 1;
    string address = 2;
    string phone = 3;
    string currency = 4;
}

message Store {
    string id = 1;
    string name = 2;
    string slug = 3;
    string address = 4;
    string phone = 5;
    string currency = 6;
    string tenant_id = 7;
}
