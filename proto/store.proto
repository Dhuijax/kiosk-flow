syntax = "proto3";

package store;

service StoreService {
    rpc GetStoreInfo (GetStoreRequest) returns (Store);
    rpc UpdateStore (UpdateStoreRequest) returns (Store);
}

service TenantSettingsService {
    rpc GetSettings (GetSettingsRequest) returns (TenantSettings);
    rpc UpdateSettings (UpdateSettingsRequest) returns (TenantSettings);
}

message GetStoreRequest {
    string id = 1; 
}

message UpdateStoreRequest {
    string name = 1;
    string address = 2;
    string phone = 3;
    string currency = 4;
}

message Store {
    string id = 1;
    string name = 2;
    string slug = 3;
    string address = 4;
    string phone = 5;
    string currency = 6;
    string tenant_id = 7;
}

message GetSettingsRequest {}

message UpdateSettingsRequest {
    string theme_color = 1;
    int32 kiosk_timeout_seconds = 2;
    string language = 3;
    string currency = 4;
}

message TenantSettings {
    string theme_color = 1;
    string logo_url = 2;
    int32 kiosk_timeout_seconds = 3;
    string language = 4;
    string currency = 5;
    string updated_at = 6;
}
